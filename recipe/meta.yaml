{% set python_min = "3.10" %}
{% set name = "txl-text-editor" %}
{% set version = "0.3.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/txl_text_editor-{{ version }}.tar.gz
  sha256: f079fd25d6f77cfb1a9284491c632e63b5f2613e3edd1384b9bde636a3b918cc

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - txl =0.3.2

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - txl_text_editor

about:
  home: https://github.com/davidbrochart/jpterm/blob/main/plugins/text_editor
  summary: TXL plugin for a text editor
  dev_url: https://github.com/davidbrochart/jpterm/blob/main/plugins/text_editor
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT

extra:
  recipe-maintainers:
    - davidbrochart
